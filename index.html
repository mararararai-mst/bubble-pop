<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#c2e9fb">
<meta property="og:title" content="シャボン玉ぷちぷち">
<meta property="og:description" content="1歳からの指あそびアプリ。タップでシャボン玉を割って遊ぼう。">
<title>シャボン玉ぷちぷち</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    overflow: hidden; touch-action: none;
    background: linear-gradient(180deg, #c2e9fb 0%, #fceabb 60%, #fbc2eb 100%);
    user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Maru Gothic ProN",
                 "Yu Gothic UI", "Meiryo", sans-serif;
  }
  canvas { display: block; position: fixed; inset: 0; touch-action: none; }
  #start {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center; gap: 32px;
    background: linear-gradient(180deg, #c2e9fb 0%, #fceabb 60%, #fbc2eb 100%);
    cursor: pointer;
    animation: fadeIn 0.6s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  #start h1 {
    font-size: clamp(40px, 9vw, 88px);
    margin: 0; color: #fff; font-weight: 800;
    text-shadow: 0 6px 20px rgba(255, 150, 200, 0.5),
                 0 2px 6px rgba(0, 0, 0, 0.1);
    letter-spacing: 0.05em;
  }
  #start p {
    font-size: clamp(20px, 4.5vw, 40px);
    margin: 0; color: #fff; font-weight: 700;
    text-shadow: 0 3px 10px rgba(255, 150, 200, 0.4);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.08); opacity: 1; }
  }
  #start .bubble-deco {
    font-size: clamp(60px, 14vw, 120px);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-20px) rotate(5deg); }
  }
</style>
</head>
<body>
<div id="start">
  <div class="bubble-deco">🫧</div>
  <h1>シャボン玉 ぷちぷち</h1>
  <p>がめんを タッチしてね</p>
</div>
<canvas id="cv"></canvas>
<script>
(() => {
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const startEl = document.getElementById('start');

  let W, H, DPR;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = cv.width = innerWidth * DPR;
    H = cv.height = innerHeight * DPR;
    cv.style.width = innerWidth + 'px';
    cv.style.height = innerHeight + 'px';
  }
  resize();
  addEventListener('resize', resize);
  addEventListener('orientationchange', () => setTimeout(resize, 100));

  // ===== オーディオ =====
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function playPop(baseFreq) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(baseFreq * 2.2, t);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.5, t + 0.18);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.28, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.25);

    // ちょっとキラキラ感を足す
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(baseFreq * 4, t);
    osc2.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, t + 0.12);
    gain2.gain.setValueAtTime(0.0001, t);
    gain2.gain.exponentialRampToValueAtTime(0.08, t + 0.01);
    gain2.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
    osc2.connect(gain2).connect(audioCtx.destination);
    osc2.start(t);
    osc2.stop(t + 0.16);
  }
  // ===== 動物リスト =====
  const animals = ['🐶','🐱','🐰','🐘','🦁','🐸','🐮','🐷','🐔','🦒','🐼','🐧','🐵','🐻','🐤'];

  // ===== シャボン玉 =====
  class Bubble {
    constructor() {
      this.r = (38 + Math.random() * 55) * DPR;
      this.x = Math.random() * (W - this.r * 2) + this.r;
      this.y = H + this.r + Math.random() * 200 * DPR;
      this.vy = -(0.4 + Math.random() * 0.9) * DPR;
      this.vx = (Math.random() - 0.5) * 0.3 * DPR;
      this.hue = Math.random() * 360;
      this.wobble = Math.random() * Math.PI * 2;
      this.wobbleSp = 0.015 + Math.random() * 0.015;
      this.scale = 1;
      this.animal = Math.random() < 0.28
        ? animals[Math.floor(Math.random() * animals.length)]
        : null;
      this.alive = true;
    }
    update() {
      this.wobble += this.wobbleSp;
      this.x += this.vx + Math.sin(this.wobble) * 0.4 * DPR;
      this.y += this.vy;
      if (this.y + this.r < -20) this.alive = false;
    }
    draw() {
      const r = this.r;
      const grd = ctx.createRadialGradient(
        this.x - r * 0.35, this.y - r * 0.35, r * 0.05,
        this.x, this.y, r
      );
      grd.addColorStop(0, `hsla(${this.hue}, 100%, 96%, 0.95)`);
      grd.addColorStop(0.55, `hsla(${this.hue}, 80%, 78%, 0.55)`);
      grd.addColorStop(0.9, `hsla(${(this.hue + 50) % 360}, 85%, 70%, 0.55)`);
      grd.addColorStop(1, `hsla(${(this.hue + 90) % 360}, 80%, 65%, 0.7)`);

      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = `hsla(${this.hue}, 100%, 85%, 0.9)`;
      ctx.lineWidth = 2.5 * DPR;
      ctx.stroke();

      // ハイライト（大）
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.beginPath();
      ctx.arc(this.x - r * 0.38, this.y - r * 0.38, r * 0.22, 0, Math.PI * 2);
      ctx.fill();
      // ハイライト（小）
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath();
      ctx.arc(this.x - r * 0.55, this.y - r * 0.15, r * 0.08, 0, Math.PI * 2);
      ctx.fill();

      // 動物
      if (this.animal) {
        ctx.font = `${r * 1.05}px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.animal, this.x, this.y + r * 0.05);
      }
    }
    hitTest(px, py) {
      const dx = px - this.x, dy = py - this.y;
      const hit = this.r + 18 * DPR;
      return dx * dx + dy * dy < hit * hit;
    }
  }

  // ===== パーティクル =====
  class Particle {
    constructor(x, y, hue, big) {
      this.x = x; this.y = y;
      const angle = Math.random() * Math.PI * 2;
      const sp = ((big ? 3 : 1.5) + Math.random() * (big ? 6 : 3)) * DPR;
      this.vx = Math.cos(angle) * sp;
      this.vy = Math.sin(angle) * sp - (big ? 1 : 0) * DPR;
      this.life = 1.0;
      this.decay = 0.018 + Math.random() * 0.012;
      this.hue = hue;
      this.r = ((big ? 4 : 2) + Math.random() * (big ? 6 : 4)) * DPR;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += 0.08 * DPR;
      this.vx *= 0.99;
      this.life -= this.decay;
    }
    draw() {
      if (this.life <= 0) return;
      ctx.fillStyle = `hsla(${this.hue}, 95%, 75%, ${this.life})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r * this.life, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ===== ハート（動物入りを割ったとき） =====
  class Heart {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.vy = -2 * DPR;
      this.life = 1.0;
      this.size = (30 + Math.random() * 20) * DPR;
    }
    update() {
      this.y += this.vy;
      this.life -= 0.012;
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = this.life;
      ctx.font = `${this.size}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('💕', this.x, this.y);
      ctx.restore();
    }
  }

  const bubbles = [];
  const particles = [];
  const hearts = [];

  function pop(b) {
    const count = b.animal ? 28 : 18;
    for (let i = 0; i < count; i++) {
      particles.push(new Particle(b.x, b.y, b.hue, b.animal && i < 10));
    }
    playPop(500 + Math.random() * 500);
    if (b.animal) {
      hearts.push(new Heart(b.x, b.y));
    }
    b.alive = false;
  }

  function spawnIfNeeded() {
    const target = 7;
    let alive = 0;
    for (const b of bubbles) if (b.alive) alive++;
    while (alive < target) {
      bubbles.push(new Bubble());
      alive++;
    }
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    spawnIfNeeded();

    for (const b of bubbles) {
      if (b.alive) { b.update(); b.draw(); }
    }
    for (let i = bubbles.length - 1; i >= 0; i--) {
      if (!bubbles[i].alive) bubbles.splice(i, 1);
    }

    for (const p of particles) { p.update(); p.draw(); }
    for (let i = particles.length - 1; i >= 0; i--) {
      if (particles[i].life <= 0) particles.splice(i, 1);
    }

    for (const h of hearts) { h.update(); h.draw(); }
    for (let i = hearts.length - 1; i >= 0; i--) {
      if (hearts[i].life <= 0) hearts.splice(i, 1);
    }

    requestAnimationFrame(loop);
  }

  function handleTap(clientX, clientY) {
    const px = clientX * DPR;
    const py = clientY * DPR;

    let hit = false;
    // 後ろから検索（手前の玉を優先）
    for (let i = bubbles.length - 1; i >= 0; i--) {
      const b = bubbles[i];
      if (b.alive && b.hitTest(px, py)) {
        pop(b);
        hit = true;
        break;
      }
    }
    if (!hit) {
      // 外しても小さく反応
      for (let i = 0; i < 8; i++) {
        particles.push(new Particle(px, py, Math.random() * 360, false));
      }
      playPop(380 + Math.random() * 180);
    }
  }

  cv.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      handleTap(t.clientX, t.clientY);
    }
  }, { passive: false });

  cv.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });

  cv.addEventListener('mousedown', e => {
    handleTap(e.clientX, e.clientY);
  });

  startEl.addEventListener('click', () => {
    initAudio();
    startEl.style.transition = 'opacity 0.4s';
    startEl.style.opacity = '0';
    setTimeout(() => { startEl.style.display = 'none'; }, 400);

    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(() => {});
    }
  }, { once: true });

  loop();
})();
</script>
</body>
</html>
